<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>💥 BOX BLAST · 5 CLICKS · 3 ADS UNLOCK</title>
    <!-- AdsGram SDK (blockId: int-24115) -->
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <!-- Monetag SDK (zone: 10867497) -->
    <script src='//libtl.com/sdk.js' data-zone='10867497' data-sdk='show_10867497'></script>
    <!-- Adexora SDK (App ID: 2025) -->
    <script src="https://adexora.com/cdn/ads.js?id=2025"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', system-ui, -apple-system, 'Segoe UI', sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0f0c29, #1a1a3a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        /* loading screen */
        .loading-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(145deg, #0a0a1a, #12122f);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2100;
            transition: opacity 0.4s;
        }
        .loading-logo {
            font-size: 2.6rem;
            font-weight: 900;
            background: linear-gradient(135deg, #FFD966, #FF8C00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .loading-bar-container {
            width: 70%;
            max-width: 280px;
            height: 12px;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            margin: 20px;
            overflow: hidden;
        }
        .loading-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #FFB347, #FF6B00);
            transition: width 0.2s;
        }
        .loading-percent {
            color: #FFD966;
            font-weight: bold;
            margin-top: 8px;
        }

        /* main container */
        .game-container {
            width: 100%;
            max-width: 560px;
            background: rgba(10, 20, 35, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 56px;
            padding: 20px 18px 24px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,200,0.1);
            border: 1px solid rgba(255, 200, 80, 0.5);
        }

        .blast-header {
            text-align: center;
            margin-bottom: 20px;
        }
        .title {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFE6B0, #FFA559);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 1px;
        }
        .sub {
            font-size: 0.7rem;
            color: #FFD966;
            background: #00000066;
            display: inline-block;
            padding: 4px 16px;
            border-radius: 40px;
            margin-top: 8px;
        }
        .level-scroll {
            max-height: 450px;
            overflow-y: auto;
            padding: 8px 4px;
            margin: 12px 0;
            scrollbar-width: thin;
        }
        .level-group {
            background: rgba(0,0,0,0.4);
            border-radius: 36px;
            padding: 16px 12px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,180,60,0.5);
        }
        .group-title {
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 14px;
            color: #FFD966;
        }
        .level-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 14px;
        }
        .level-btn {
            padding: 14px 20px;
            font-size: 1.2rem;
            font-weight: bold;
            min-width: 70px;
            border-radius: 28px;
            background: linear-gradient(145deg, #2c3e66, #1a2a4a);
            box-shadow: 0 7px 0 #0f1420;
            transition: 0.07s linear;
            border: 1px solid rgba(255,215,0,0.5);
            color: white;
            cursor: pointer;
            text-align: center;
            position: relative;
        }
        .level-btn:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #0f1420;
        }
        .level-btn.locked {
            opacity: 0.55;
            filter: grayscale(0.4);
            background: linear-gradient(145deg, #3a3a4a, #2a2a3a);
            cursor: not-allowed;
            transform: none;
            pointer-events: none;
        }
        .level-btn.completed {
            background: linear-gradient(145deg, #2e7d32, #1b5e20);
            border-color: #FFD700;
            cursor: default;
            opacity: 0.8;
            pointer-events: none;
        }
        .check-icon {
            position: absolute;
            top: -6px;
            right: -8px;
            background: #4caf50;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            border: 1px solid gold;
        }
        .lock-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.3rem;
            color: #FFD700;
        }

        /* Gameplay panel (5 clicks) */
        .game-panel {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.96);
            backdrop-filter: blur(20px);
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .game-panel.active {
            visibility: visible;
            opacity: 1;
        }
        .game-card {
            background: linear-gradient(145deg, #1e2a2f, #0f1a1f);
            border-radius: 56px;
            padding: 28px 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 2px solid #FFB347;
            box-shadow: 0 30px 40px rgba(0,0,0,0.6);
        }
        .game-level-title {
            font-size: 2rem;
            font-weight: 800;
            color: #FFD966;
            text-shadow: 2px 2px 0 #7a3e00;
            margin-bottom: 16px;
        }
        .instruction {
            background: #000000aa;
            border-radius: 40px;
            padding: 12px;
            color: #FFD966;
            font-weight: bold;
            margin: 12px 0;
        }
        .progress-box {
            background: #00000099;
            border-radius: 60px;
            padding: 12px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #FFD966;
            margin: 16px 0;
        }
        .clicks-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 18px;
            margin: 24px 0;
        }
        .click-btn {
            background: linear-gradient(135deg, #FFA559, #FF6B00);
            border: none;
            padding: 18px 0;
            font-size: 1.3rem;
            font-weight: 800;
            border-radius: 60px;
            color: #2c1a00;
            cursor: pointer;
            transition: 0.05s linear;
            box-shadow: 0 6px 0 #9b4a00;
            text-align: center;
        }
        .click-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #9b4a00;
        }
        .click-btn.disabled {
            opacity: 0.6;
            transform: translateY(0);
            pointer-events: none;
            filter: grayscale(0.2);
        }
        .close-game-btn {
            background: #2a2a2a;
            color: #FFB347;
            padding: 12px 24px;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            margin-top: 16px;
            cursor: pointer;
        }

        /* Ad modal (retry UI) */
        .ad-modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.96);
            backdrop-filter: blur(14px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 4000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .ad-modal.active {
            visibility: visible;
            opacity: 1;
        }
        .modal-card {
            background: linear-gradient(145deg, #1e1a3a, #0f0c2c);
            width: 90%;
            max-width: 380px;
            border-radius: 48px;
            padding: 28px 20px;
            text-align: center;
            border: 2px solid #FFD700;
        }
        .ad-icon-large {
            font-size: 3rem;
            color: #FF9800;
            margin-bottom: 12px;
        }
        .btn-modal {
            background: linear-gradient(95deg, #FF416C, #FF4B2B);
            border: none;
            padding: 12px 20px;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            width: 80%;
            margin: 10px auto;
            cursor: pointer;
            font-size: 1rem;
        }
        .countdown-circle {
            font-size: 2.2rem;
            font-weight: bold;
            background: #000000aa;
            width: 70px;
            height: 70px;
            line-height: 70px;
            border-radius: 50%;
            margin: 12px auto;
            color: #FFD700;
        }
        .victory-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, #0f0c29, #302b63);
            z-index: 5000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .victory-screen.active {
            visibility: visible;
            opacity: 1;
        }
        .code-container {
            background: rgba(0,0,0,0.7);
            padding: 20px;
            border-radius: 28px;
            margin: 20px;
            border: 2px solid #FFD700;
        }
        .code-value {
            font-size: 1.3rem;
            letter-spacing: 2px;
            background: #000000aa;
            padding: 12px;
            border-radius: 20px;
            margin: 12px 0;
            color: #FFD700;
            font-family: monospace;
        }
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #000000cc;
            color: #FFD700;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.8rem;
            z-index: 6000;
            pointer-events: none;
            opacity: 0;
            transition: 0.2s;
        }
        .reset-progress {
            background: rgba(0,0,0,0.5);
            border: 1px solid #ff9800;
            border-radius: 40px;
            padding: 8px 16px;
            font-size: 0.8rem;
            margin-top: 18px;
            text-align: center;
            cursor: pointer;
            color: white;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }
        .footer-note {
            text-align: center;
            font-size: 0.7rem;
            color: #FFD966aa;
            margin-top: 12px;
        }
    </style>
</head>
<body>

<div id="loadingScreen" class="loading-screen">
    <div class="loading-logo">💥 BOX BLAST 💥</div>
    <div class="loading-bar-container"><div class="loading-bar" id="loadingBar"></div></div>
    <div class="loading-percent" id="loadingPercent">0%</div>
    <div style="color:#FFD966; font-size:12px;">Loading ads & stages...</div>
</div>

<div class="game-container" id="mainGameScreen" style="display: none;">
    <div class="blast-header">
        <div class="title">📦 BOX BLAST 🔥</div>
        <div class="sub">⚡ 5 CLICKS PER STAGE · 3 ADS TO UNLOCK ⚡</div>
    </div>
    <div class="level-scroll" id="levelContainer"></div>
    <div class="reset-progress" id="resetAllBtn"><i class="fas fa-undo-alt"></i> Reset All Progress</div>
    <div class="footer-note">👉 Each level: tap all 5 "CLICK" buttons 👈</div>
</div>

<!-- Gameplay panel (5 click boxes) -->
<div id="gameplayPanel" class="game-panel">
    <div class="game-card">
        <div class="game-level-title" id="gameLevelTitle">STAGE 1</div>
        <div class="instruction">💣 CLICK ALL 5 BOXES TO DETONATE 💣</div>
        <div class="progress-box" id="gameProgress">0 / 5 CLICKS</div>
        <div class="clicks-grid" id="clicksGrid"></div>
        <button class="close-game-btn" id="exitGameBtn">🏠 BACK TO MENU</button>
    </div>
</div>

<!-- Ad Modal (retry UI, same as boxtg style) -->
<div id="adModal" class="ad-modal">
    <div class="modal-card">
        <div id="modalDynamicContent"></div>
    </div>
</div>

<!-- Victory screen -->
<div id="victoryScreen" class="victory-screen">
    <div style="font-size: 4rem;">🏆</div>
    <h2 style="color:white">ALL STAGES CLEARED!</h2>
    <p style="color:#FFD966">Your exclusive reward code</p>
    <div class="code-container">
        <div class="code-value" id="rewardCodeDisplay">BLAST-XXXX</div>
        <button id="copyAndResetBtn" class="btn-modal" style="background:#FF8C00;">📋 COPY & RESET</button>
    </div>
</div>

<div id="toastMsg" class="toast-msg"></div>

<script>
    // ======================== AD CONFIG (from boxtg) ========================
    const ADSGRAM_BLOCK = "int-24115";
    const MONETAG_ZONE = "10867497";
    const ADEXORA_APP_ID = "2025";

    let adsgramController = null;
    try {
        if (typeof window.Adsgram !== 'undefined') {
            adsgramController = window.Adsgram.init({ blockId: ADSGRAM_BLOCK });
        }
    } catch(e) { console.warn("Adsgram init error", e); }

    // Real ad functions (no simulation)
    async function showRealAdsgram() {
        if (!adsgramController) return false;
        try {
            const result = await adsgramController.show();
            return !!(result && result.done);
        } catch(e) { return false; }
    }
    async function showRealMonetag() {
        if (typeof window.show_10867497 === 'function') {
            try { await window.show_10867497(); return true; }
            catch(e) { return false; }
        }
        return false;
    }
    async function showRealAdexora() {
        if (typeof window.showAdexora === 'function') {
            try { await window.showAdexora(); return true; }
            catch(e) { return false; }
        }
        return false;
    }

    // Retry UI (exactly from boxtg pattern)
    async function showAdWithRetry(adName, adFunction) {
        return new Promise((resolve) => {
            const modalContent = document.getElementById('modalDynamicContent');
            const renderRetry = () => {
                modalContent.innerHTML = `
                    <div><i class="fas fa-exclamation-triangle ad-icon-large" style="color:#ff8888;"></i></div>
                    <h3 style="color:#FFD700;">${adName} Ad Failed</h3>
                    <p style="color:#ffaaaa;">Could not load ad. Please retry.</p>
                    <button id="retryAdBtn" class="btn-modal">🔄 RETRY</button>
                    <p style="font-size:12px; margin-top:10px;">Click retry to attempt again</p>
                `;
                const retryBtn = document.getElementById('retryAdBtn');
                if (retryBtn) {
                    retryBtn.onclick = async () => {
                        const success = await adFunction();
                        if (success) resolve(true);
                        else renderRetry();
                    };
                }
            };
            adFunction().then(success => {
                if (success) resolve(true);
                else renderRetry();
            }).catch(() => renderRetry());
        });
    }

    // ======================== GAME LOGIC ========================
    const TOTAL_LEVELS = 10;
    let unlockedLevels = [1];
    let completedLevels = [];
    let currentPlayingLevel = null;
    let clickStates = [false, false, false, false, false];
    let isInAdFlow = false;
    let currentFlowStep = 0;  // 0: Adsgram, 1: Monetag, 2: (Adexora or second Adsgram)
    let pendingLevel = null;

    function showToast(msg, duration=1800) {
        const toast = document.getElementById('toastMsg');
        toast.innerText = msg;
        toast.style.opacity = '1';
        setTimeout(() => toast.style.opacity = '0', duration);
    }

    function isBreakLevel(level) {
        return (level === 3 || level === 6 || level === 9);
    }

    function saveProgress() {
        localStorage.setItem('boxblast_unlocked', JSON.stringify(unlockedLevels));
        localStorage.setItem('boxblast_completed', JSON.stringify(completedLevels));
    }

    function loadProgress() {
        const savedUnlocked = localStorage.getItem('boxblast_unlocked');
        const savedCompleted = localStorage.getItem('boxblast_completed');
        if (savedUnlocked) {
            try { unlockedLevels = JSON.parse(savedUnlocked); } catch(e) {}
        }
        if (savedCompleted) {
            try { completedLevels = JSON.parse(savedCompleted); } catch(e) {}
        }
        if (!unlockedLevels.length) unlockedLevels = [1];
        unlockedLevels = [...new Set(unlockedLevels.filter(l => l>=1 && l<=TOTAL_LEVELS))];
        completedLevels = [...new Set(completedLevels.filter(l => l>=1 && l<=TOTAL_LEVELS))];
        if (!unlockedLevels.includes(1)) unlockedLevels.push(1);
    }

    function renderLevels() {
        const container = document.getElementById('levelContainer');
        if (!container) return;
        container.innerHTML = '';
        const groups = [[1,5,"🌟 BEGINNER BLAST","#FFB347"],[6,10,"⚡ MASTER EXPLOSION","#FF6B00"]];
        for (let [start, end, title, color] of groups) {
            const groupDiv = document.createElement('div');
            groupDiv.className = 'level-group';
            groupDiv.innerHTML = `<div class="group-title" style="text-shadow:0 0 3px ${color};">${title}</div><div class="level-row" id="row-${start}"></div>`;
            const row = groupDiv.querySelector('.level-row');
            for (let lvl = start; lvl <= end; lvl++) {
                const isUnlocked = unlockedLevels.includes(lvl);
                const isCompleted = completedLevels.includes(lvl);
                const btn = document.createElement('button');
                btn.className = 'level-btn';
                btn.innerText = lvl;
                if (!isUnlocked) {
                    btn.classList.add('locked');
                    const lockIcon = document.createElement('i');
                    lockIcon.className = 'fas fa-lock lock-icon';
                    btn.appendChild(lockIcon);
                } else if (isCompleted) {
                    btn.classList.add('completed');
                    const checkSpan = document.createElement('span');
                    checkSpan.className = 'check-icon';
                    checkSpan.innerHTML = '<i class="fas fa-check"></i>';
                    btn.appendChild(checkSpan);
                } else {
                    btn.onclick = (e) => {
                        e.stopPropagation();
                        if (isInAdFlow) { showToast("Please wait, ad in progress"); return; }
                        startAdFlowForLevel(lvl);
                    };
                }
                row.appendChild(btn);
            }
            container.appendChild(groupDiv);
        }
    }

    // ======================== AD FLOW (3 ads with break pattern) ========================
    const adModal = document.getElementById('adModal');
    const modalDynamic = document.getElementById('modalDynamicContent');

    function closeAdModal() {
        adModal.classList.remove('active');
        isInAdFlow = false;
        currentFlowStep = 0;
        pendingLevel = null;
    }

    function showModalStep(stepIndex) {
        const level = pendingLevel;
        const needAdexora = !isBreakLevel(level);
        if (stepIndex === 0) {
            modalDynamic.innerHTML = `
                <div><i class="fas fa-ad ad-icon-large"></i></div>
                <h3 style="color:#FFD700;">AdsGram Ad (1/3)</h3>
                <p>Watch to continue</p>
                <button id="stepAdBtn" class="btn-modal">📺 WATCH ADSGRAM</button>
            `;
            const btn = document.getElementById('stepAdBtn');
            btn.onclick = async () => {
                const success = await showAdWithRetry("AdsGram", showRealAdsgram);
                if (success) showModalStep(1);
                else { closeAdModal(); showToast("Ad flow cancelled"); }
            };
        } 
        else if (stepIndex === 1) {
            modalDynamic.innerHTML = `
                <div><i class="fas fa-coins ad-icon-large" style="color:#FFD700;"></i></div>
                <h3 style="color:#FFD700;">Monetag Ad (2/3)</h3>
                <p>Rewarded interstitial</p>
                <button id="stepAdBtn" class="btn-modal">🎬 SHOW MONETAG</button>
            `;
            const btn = document.getElementById('stepAdBtn');
            btn.onclick = async () => {
                const success = await showAdWithRetry("Monetag", showRealMonetag);
                if (success) showModalStep(2);
                else { closeAdModal(); showToast("Ad flow cancelled"); }
            };
        }
        else if (stepIndex === 2) {
            if (needAdexora) {
                modalDynamic.innerHTML = `
                    <div><i class="fas fa-chart-line ad-icon-large" style="color:#4CAF50;"></i></div>
                    <h3 style="color:#FFD700;">Adexora Ad (3/3)</h3>
                    <p>Final ad before level</p>
                    <button id="stepAdBtn" class="btn-modal">▶️ SHOW ADEXORA</button>
                `;
                const btn = document.getElementById('stepAdBtn');
                btn.onclick = async () => {
                    const success = await showAdWithRetry("Adexora", showRealAdexora);
                    if (success) finishAdFlowAndStartGame();
                    else { closeAdModal(); showToast("Ad flow failed"); }
                };
            } else {
                // break level: second Adsgram instead of Adexora
                modalDynamic.innerHTML = `
                    <div><i class="fas fa-ad ad-icon-large" style="color:#FF9800;"></i></div>
                    <h3 style="color:#FFD700;">Extra AdsGram (3/3)</h3>
                    <p>Double explosion mode</p>
                    <button id="stepAdBtn" class="btn-modal">📺 SHOW SECOND ADSGRAM</button>
                `;
                const btn = document.getElementById('stepAdBtn');
                btn.onclick = async () => {
                    const success = await showAdWithRetry("AdsGram (2nd)", showRealAdsgram);
                    if (success) finishAdFlowAndStartGame();
                    else { closeAdModal(); showToast("Second Adsgram failed"); }
                };
            }
        }
    }

    async function finishAdFlowAndStartGame() {
        closeAdModal();
        if (!pendingLevel) return;
        // start gameplay with 5 click buttons
        currentPlayingLevel = pendingLevel;
        clickStates = [false, false, false, false, false];
        openGameplayPanel();
    }

    function startAdFlowForLevel(levelNum) {
        if (completedLevels.includes(levelNum)) {
            showToast("Stage already completed!");
            return;
        }
        if (!unlockedLevels.includes(levelNum)) {
            showToast("Locked! Complete previous stage.");
            return;
        }
        if (isInAdFlow) return;
        isInAdFlow = true;
        pendingLevel = levelNum;
        currentFlowStep = 0;
        adModal.classList.add('active');
        showModalStep(0);
    }

    // ======================== GAMEPLAY: 5 CLICK BUTTONS ========================
    const gameplayPanel = document.getElementById('gameplayPanel');
    const clicksGrid = document.getElementById('clicksGrid');
    const gameProgressSpan = document.getElementById('gameProgress');
    const gameLevelTitleSpan = document.getElementById('gameLevelTitle');

    function openGameplayPanel() {
        if (!currentPlayingLevel) return;
        gameLevelTitleSpan.innerText = `💥 STAGE ${currentPlayingLevel} 💥`;
        renderClickButtons();
        gameplayPanel.classList.add('active');
    }

    function renderClickButtons() {
        const clickedCount = clickStates.filter(v => v === true).length;
        gameProgressSpan.innerText = `${clickedCount} / 5 CLICKS`;
        clicksGrid.innerHTML = '';
        for (let i = 0; i < 5; i++) {
            const btn = document.createElement('button');
            btn.className = 'click-btn';
            if (clickStates[i]) {
                btn.classList.add('disabled');
                btn.innerText = '✅ CLICK';
                btn.disabled = true;
            } else {
                btn.innerText = '💣 CLICK';
            }
            btn.onclick = () => {
                if (clickStates[i]) return;
                clickStates[i] = true;
                renderClickButtons();
                if (clickStates.every(v => v === true)) {
                    // level completed!
                    completeLevelAndUnlockNext();
                }
            };
            clicksGrid.appendChild(btn);
        }
    }

    async function completeLevelAndUnlockNext() {
        const levelCompleted = currentPlayingLevel;
        if (completedLevels.includes(levelCompleted)) {
            closeGameplayPanel();
            showToast("Already completed!");
            return;
        }
        // mark completed
        completedLevels.push(levelCompleted);
        const nextLevel = levelCompleted + 1;
        if (nextLevel <= TOTAL_LEVELS && !unlockedLevels.includes(nextLevel)) {
            unlockedLevels.push(nextLevel);
            unlockedLevels.sort((a,b)=>a-b);
            showToast(`🎉 Stage ${levelCompleted} cleared! Unlocked Stage ${nextLevel}`);
        } else if (nextLevel <= TOTAL_LEVELS) {
            showToast(`✅ Stage ${levelCompleted} completed!`);
        } else if (levelCompleted === TOTAL_LEVELS) {
            showToast("🏆 ALL STAGES DONE! Reward unlocked!");
        } else {
            showToast(`Stage ${levelCompleted} done!`);
        }
        saveProgress();
        renderLevels();
        closeGameplayPanel();

        if (levelCompleted === TOTAL_LEVELS) {
            showVictoryReward();
        }
    }

    function closeGameplayPanel() {
        gameplayPanel.classList.remove('active');
        currentPlayingLevel = null;
    }

    function showVictoryReward() {
        const code = `BLAST-${Math.random().toString(36).substr(2, 8).toUpperCase()}`;
        document.getElementById('rewardCodeDisplay').innerText = code;
        document.getElementById('victoryScreen').classList.add('active');
    }

    function fullReset() {
        unlockedLevels = [1];
        completedLevels = [];
        saveProgress();
        renderLevels();
        closeGameplayPanel();
        closeAdModal();
        document.getElementById('victoryScreen').classList.remove('active');
        showToast("Game reset! Stage 1 unlocked.");
    }

    // copy & reset from victory screen
    function copyAndReset() {
        const code = document.getElementById('rewardCodeDisplay').innerText;
        navigator.clipboard.writeText(code).then(() => {
            showToast("✅ Code copied! Resetting game.");
            fullReset();
        }).catch(() => {
            fullReset();
        });
    }

    // ======================== LOADING & INIT ========================
    let loadProgressVal = 0;
    const loadingInterval = setInterval(() => {
        loadProgressVal += Math.random() * 12 + 5;
        if (loadProgressVal >= 100) {
            clearInterval(loadingInterval);
            document.getElementById('loadingScreen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loadingScreen').style.display = 'none';
                document.getElementById('mainGameScreen').style.display = 'block';
            }, 300);
        }
        document.getElementById('loadingBar').style.width = Math.min(100, loadProgressVal) + '%';
        document.getElementById('loadingPercent').innerText = Math.floor(Math.min(100, loadProgressVal)) + '%';
    }, 80);

    // Event binding
    document.addEventListener('DOMContentLoaded', () => {
        loadProgress();
        renderLevels();
        document.getElementById('exitGameBtn').addEventListener('click', () => {
            closeGameplayPanel();
        });
        document.getElementById('resetAllBtn').addEventListener('click', () => {
            if (confirm("⚠️ Reset all progress? You'll start from Stage 1.")) fullReset();
        });
        document.getElementById('copyAndResetBtn').addEventListener('click', copyAndReset);
        // close modal on outside click? optional
        adModal.addEventListener('click', (e) => {
            if (e.target === adModal) {
                closeAdModal();
                showToast("Ad flow cancelled");
            }
        });
    });
</script>
</body>
</html>
